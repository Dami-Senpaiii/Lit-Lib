<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LitAudio – Web MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <p class="badge">MVP Prototype</p>
        <h1>LitAudio Bibliothek</h1>
        <p class="subline">Klassiker hören. Kontext verstehen. Besser lernen.</p>
      </div>
    </header>

    <main class="container">
      <section class="auth-shell" aria-label="Login und Session">
        <p id="authStatus" class="meta">Nicht angemeldet</p>
        <form id="authForm" class="auth-form-grid">
          <input id="loginEmail" type="email" placeholder="E-Mail" required />
          <input id="loginPassword" type="password" placeholder="Passwort" required />
          <button type="submit">Anmelden</button>
        </form>
        <div class="auth-actions">
          <button id="logoutButton" type="button" hidden>Abmelden</button>
          <a id="adminLink" href="./admin.html" hidden>Admin öffnen</a>
        </div>
        <p id="authMessage" class="meta"></p>
        <p class="meta">Demo: admin@litaudio.local / admin123 · lehrer@litaudio.local / teacher123 · schueler@litaudio.local / student123</p>
      </section>

      <section class="controls" aria-label="Filter und Suche">
        <div class="control-group">
          <label for="searchInput">Suche</label>
          <input id="searchInput" type="search" placeholder="Titel oder Autor" />
        </div>

        <div class="control-group">
          <label for="periodSelect">Epoche</label>
          <select id="periodSelect">
            <option value="">Alle</option>
          </select>
        </div>

        <div class="control-group">
          <label for="authorSelect">Autor</label>
          <select id="authorSelect">
            <option value="">Alle</option>
          </select>
        </div>
      </section>

      <section class="summary-row">
        <p id="resultSummary">Lade Bibliothek…</p>
      </section>

      <section>
        <ul id="workList" class="work-list" aria-live="polite"></ul>
      </section>
    </main>

    <template id="workCardTemplate">
      <li class="work-card">
        <h2 class="work-title"></h2>
        <p class="meta"></p>
        <p class="synopsis"></p>
        <dl class="details"></dl>
      </li>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
