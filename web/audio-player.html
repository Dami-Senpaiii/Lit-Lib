<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LitAudio – Audio-Player</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <p class="badge">MVP Prototype</p>
        <h1>Audio-Player</h1>
        <p class="subline">Höre dein ausgewähltes Werk direkt im Browser.</p>
      </div>
    </header>

    <main class="container">
      <section class="player-shell" aria-label="Audio-Player für Werk">
        <a class="back-link" href="./index.html">← Zur Bibliothek</a>
        <h2 id="playerTitle">Werk wird geladen…</h2>
        <p id="playerMeta" class="meta"></p>

        <audio id="audioPlayer" class="audio-player" preload="metadata">
          Dein Browser unterstützt das Audio-Element nicht.
        </audio>
        <section class="progress-shell" aria-label="Abspielposition und Zeitstempel">
          <div class="progress-header">
            <button id="playToggle" type="button">▶️ Abspielen</button>
            <span id="currentTimeLabel">00:00</span>
            <span id="durationLabel">00:00</span>
          </div>
          <div class="progress-line">
            <input
              id="progressRange"
              class="progress-range"
              type="range"
              min="0"
              max="1000"
              value="0"
              step="1"
              aria-label="Abspielposition"
            />
            <div id="progressStampLayer" class="progress-stamp-layer" aria-hidden="true"></div>
          </div>
        </section>

        <section id="bookmarkSection" class="bookmark-section" aria-label="Lesezeichen">
          <div class="bookmark-header">
            <h3>Relevanz & Lesezeichen</h3>
            <p id="relevantNotice" class="meta"></p>
          </div>
          <form id="bookmarkForm" class="bookmark-form" hidden>
            <label for="bookmarkNote">Notiz zum Zeitstempel</label>
            <input id="bookmarkNote" type="text" maxlength="180" placeholder="z. B. Stilmittel ab 01:12 erklären" />
            <button type="submit">Zeitstempel speichern</button>
          </form>
          <ul id="bookmarkList" class="bookmark-list"></ul>
        </section>

        <p id="accessNotice" class="player-note">Prüfe Dateiberechtigungen…</p>
      </section>
    </main>

    <script type="module" src="./audio-player.js"></script>
  </body>
</html>
